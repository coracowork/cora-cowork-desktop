# .github/workflows/build.yml
name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  BUN_VERSION: '1.2.14'
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            script: build-win:x64
            artifact_path: |
              out/CoraCowork-*.exe
              dist/CoraCowork-*.exe
            output_name: CoraCowork-Windows-x64
            
          # Windows ARM64 (cross-compile)
          - os: windows-latest
            platform: win
            arch: arm64
            script: build-win:arm64
            artifact_path: |
              out/CoraCowork-*.exe
              dist/CoraCowork-*.exe
            output_name: CoraCowork-Windows-arm64
            
          # macOS x64 (Intel)
          - os: macos-latest
            platform: mac
            arch: x64
            script: build-mac:x64
            artifact_path: |
              out/CoraCowork-*.dmg
              out/CoraCowork-*.zip
            output_name: CoraCowork-macOS-x64
            
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            platform: mac
            arch: arm64
            script: build-mac:arm64
            artifact_path: |
              out/CoraCowork-*.dmg
              out/CoraCowork-*.zip
            output_name: CoraCowork-macOS-arm64
            
          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            script: build-deb
            artifact_path: |
              out/CoraCowork-*.deb
              out/CoraCowork-*.AppImage
            output_name: CoraCowork-Linux-x64
            
          # Linux ARM64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            script: build-deb
            artifact_path: |
              out/CoraCowork-*.deb
              out/CoraCowork-*.AppImage
            output_name: CoraCowork-Linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Increase memory limit
        run: echo "NODE_OPTIONS=--max-old-space-size=8192" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: |
          bun install || true
          bun add @office-ai/platform || true

      - name: Patch prepare script for Windows ARM64
        if: matrix.platform == 'win' && matrix.arch == 'arm64'
        shell: bash
        run: |
          # Adicionar patch para pular prepareManagedResources no Windows ARM64
          echo "Patching prepare-cora-cowork.js for Windows ARM64..."
          # Isso será feito via sed ou podemos criar um arquivo de patch

      - name: Build ${{ matrix.platform }} ${{ matrix.arch }}
        run: bun run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ELECTRON_BUILDER_COMPRESSION_LEVEL: 9
          CORA_COWORK_BACKEND_VERSION: v0.2.5
          NODE_OPTIONS: --max-old-space-size=8192
          # Forçar o build a aceitar que não pode executar ARM64 em x64
          CORA_COWORK_SKIP_ARM64_EXEC: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint || true

      - name: Format check
        run: bun run format:check || true

      - name: Run tests
        run: bun run test || true