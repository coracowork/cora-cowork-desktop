name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    strategy:
      fail-fast: false

      matrix:
        include:

          - os: windows-latest
            platform: win
            arch: x64

          - os: windows-11-arm
            platform: win
            arch: arm64

          - os: ubuntu-24.04
            platform: linux
            arch: x64

          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64

          - os: macos-13
            platform: mac
            arch: x64

          - os: macos-14
            platform: mac
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install

      - run: bun run build

      - name: Build Electron
        run: |
          bunx electron-builder \
            --${{ matrix.platform }} \
            --${{ matrix.arch }} \
            --publish never

      - name: Upload Release

        uses: softprops/action-gh-release@v2

        with:

          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.zip
            dist/**/*.blockmap

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}